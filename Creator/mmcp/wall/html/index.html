<form id="wall-form">
    <div style="margin-bottom:20px;">
        <label style="display:block;margin-bottom:8px;font-weight:600;color:#86efac;">📝 Название стены:</label>
        <input type="text" name="wall_name" placeholder="my_wall" 
               style="width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:12px;color:#e2e8f0;font-size:14px;">
    </div>

    <div style="background:#0f172a;border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid #334155;">
        <div style="font-weight:600;margin-bottom:12px;color:#86efac;">⚙️ Параметры стены</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
            <div>
                <label style="display:block;margin-bottom:5px;font-size:13px;">❤️ Здоровье</label>
                <input type="number" name="health" value="100" 
                       style="width:100%;padding:10px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;">
            </div>
            <div>
                <label style="display:block;margin-bottom:5px;font-size:13px;">🚧 Размер</label>
                <input type="number" name="size" value="1" 
                       style="width:100%;padding:10px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;">
            </div>
        </div>
    </div>

    <div style="background:#0f172a;border-radius:12px;padding:12px;margin-bottom:20px;border:1px solid #334155;">
        <label style="display:flex;align-items:center;gap:12px;cursor:pointer;">
            <input type="checkbox" name="always_unlocked" 
                   style="width:20px;height:20px;accent-color:#4ade80;">
            <span style="font-weight:600;">🔓 Всегда разблокирована</span>
        </label>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button type="button" class="btn-secondary" onclick="closeModuleModal('wall')">Отмена</button>
        <button type="submit" id="execute-btn" class="btn-primary">💾 Создать стену</button>
    </div>
</form>
