<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="png/icon_64.png">
    <title>Mindustry Mod Creator</title>
    <style>
        /* ============= СТИЛИ ДЛЯ MANAGER (ОРИГИНАЛ) ============= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(30, 30, 46, 0.95);
            border-right: 1px solid #2d2d44;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2d2d44;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .settings-btn {
            background: #2d2d44;
            border: none;
            color: #eee;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            background: #3d3d5c;
        }

        .mods-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .mod-item {
            background: #25253a;
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
        }

        .mod-item:hover {
            background: #2d2d4a;
        }

        .mod-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
        }

        .mod-name {
            font-size: 14px;
            font-weight: 500;
        }

        .mod-actions {
            display: flex;
            gap: 8px;
        }

        .mod-actions button {
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .mod-actions button:hover {
            background: #3d3d5c;
            color: #fff;
        }

        .delete-btn:hover {
            color: #ff6b6b !important;
        }

        .no-mods {
            text-align: center;
            color: #666;
            padding: 30px;
        }

        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 30px;
        }

        .panel-card {
            background: rgba(30, 30, 46, 0.8);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .panel-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: #25253a;
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #2d2d44;
            color: #eee;
        }

        .btn-secondary:hover {
            background: #3d3d5c;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .info-text {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .java-status {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 8px;
        }

        .java-status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .java-status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1e1e2e;
            border-radius: 16px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #2d2d44;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #3d3d5c;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4d4d6c;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #3d3d5c;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #0f172ae6;
            border-left: 5px solid #4ade80;
            padding: 12px 28px;
            border-radius: 60px;
            z-index: 2100;
            animation: slideToast 0.3s;
        }

        @keyframes slideToast {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ============= СТИЛИ ДЛЯ РЕДАКТОРА (ОРИГИНАЛ ИЗ editor.html) ============= */
        .editor-app {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0f172a, #0a0f1f);
            color: #eef2ff;
            height: 100vh;
            overflow: hidden;
        }

        .editor-main-app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .editor-left-panel {
            width: 280px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border-right: 2px solid rgba(74, 222, 128, 0.3);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .editor-panel-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid rgba(74, 222, 128, 0.2);
            font-weight: 700;
            font-size: 18px;
            text-align: center;
            background: linear-gradient(135deg, #4ade80, #86efac);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .editor-panel-buttons {
            flex: 1;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .editor-action-btn {
            background: linear-gradient(105deg, #1e293b, #0f172a);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 16px;
            padding: 14px 16px;
            color: #e2e8f0;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            width: 100%;
        }

        .editor-action-btn:hover {
            transform: translateX(4px);
            background: #2d3a4e;
            border-color: #4ade80;
        }

        .editor-action-btn .btn-icon {
            font-size: 24px;
            min-width: 32px;
        }

        .editor-action-btn .btn-text {
            flex: 1;
        }

        .editor-panel-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(74, 222, 128, 0.15);
        }

        .editor-section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #86efac;
            margin-bottom: 12px;
        }

        .editor-content-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .editor-center-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px 0 20px;
        }

        .editor-center-tab-btn {
            padding: 10px 32px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: none;
            color: #9ca3af;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .editor-center-tab-btn:hover {
            color: #f0f9ff;
            background: rgba(74, 222, 128, 0.15);
        }

        .editor-center-tab-btn.active {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.2);
        }

        .editor-tab-content {
            display: none;
            height: 100%;
            overflow: auto;
            flex-direction: column;
        }

        .editor-tab-content.active {
            display: flex;
        }

        .editor-filter-bar {
            background: rgba(30, 41, 59, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 12px 24px;
            margin: 16px 24px 0 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            border: 1px solid rgba(74, 222, 128, 0.25);
        }

        .editor-filter-label {
            font-weight: 600;
            font-size: 13px;
            background: #4ade8022;
            padding: 5px 16px;
            border-radius: 40px;
        }

        .editor-settings-btn {
            background: #2d3a4e;
            border: none;
            padding: 8px 20px;
            border-radius: 34px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 13px;
        }

        .editor-settings-btn:hover {
            background: #3b4b62;
        }

        .editor-filter-status {
            font-size: 12px;
            color: #b9c7d9;
            background: #1e293b;
            padding: 5px 16px;
            border-radius: 28px;
        }

        .editor-blocks-container, .editor-textures-container {
            padding: 20px 24px 24px 24px;
            flex: 1;
            overflow-y: auto;
        }

        .editor-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            padding: 8px 0;
        }

        .editor-card {
            background: linear-gradient(145deg, #1e293b, #111827);
            border: 1px solid rgba(74, 222, 128, 0.25);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px 12px;
            aspect-ratio: 1 / 1;
            position: relative;
        }

        .editor-card:hover {
            transform: translateY(-6px);
            border-color: #4ade80;
            background: #1f2a3e;
        }

        .editor-card-icon {
            font-size: 56px;
            margin-bottom: 12px;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .editor-card-icon-img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 12px;
            background: #0f172a;
            padding: 6px;
        }

        .editor-card-name {
            font-size: 15px;
            font-weight: 700;
            color: #f1f5f9;
            background: #0f172a80;
            padding: 5px 12px;
            border-radius: 30px;
            margin-top: 8px;
            max-width: 100%;
            word-break: break-word;
        }

        .editor-card-type {
            font-size: 11px;
            color: #9cb2d0;
            margin-top: 8px;
        }

        .editor-card-status {
            font-size: 10px;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .editor-status-ok {
            color: #bbf7d0;
            background: rgba(74, 222, 128, 0.2);
        }

        .editor-status-bad {
            color: #fecaca;
            background: rgba(239, 68, 68, 0.2);
        }

        .editor-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .editor-modal.active {
            display: flex;
        }

        .editor-modal-content {
            background: #1e293b;
            border-radius: 40px;
            min-width: 440px;
            max-width: 640px;
            border: 1px solid rgba(74, 222, 128, 0.5);
        }

        .editor-modal-header {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(74, 222, 128, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-modal-header h3 {
            color: #86efac;
        }

        .editor-modal-close {
            background: #334155;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 28px;
            transition: all 0.2s;
        }

        .editor-modal-close:hover {
            background: #475569;
        }

        .editor-modal-body {
            padding: 26px 28px;
        }

        .editor-modal-footer {
            padding: 18px 28px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: flex-end;
            gap: 14px;
        }

        .editor-setting-item {
            background: #0f172a80;
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }

        .editor-badge-count {
            background: #4ade8033;
            border-radius: 40px;
            padding: 2px 10px;
            margin-left: 12px;
            font-size: 12px;
        }

        .editor-toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #0f172ae6;
            border-left: 5px solid #4ade80;
            padding: 12px 28px;
            border-radius: 60px;
            z-index: 2100;
            animation: editorSlideToast 0.3s;
        }

        @keyframes editorSlideToast {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .editor-empty-state {
            text-align: center;
            padding: 60px 30px;
            background: rgba(30,41,59,0.5);
            border-radius: 44px;
            margin-top: 20px;
        }

        .editor-log-modal .editor-modal-content {
            min-width: 800px;
            max-width: 900px;
            width: 80vw;
            height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .editor-log-container {
            flex: 1;
            overflow: auto;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #d4d4d4;
        }

        .editor-log-line {
            font-family: 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
            border-left: 3px solid transparent;
            padding-left: 8px;
            margin-bottom: 2px;
        }

        .editor-log-timestamp {
            color: #808080;
            margin-right: 8px;
        }

        .editor-progress-bar-container {
            background: #334155;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
            margin: 12px 0;
        }

        .editor-progress-bar {
            background: #4ade80;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
            border-radius: 10px;
        }

        .editor-progress-indeterminate {
            width: 30%;
            animation: editor-progress-animation 1.5s infinite ease-in-out;
        }

        @keyframes editor-progress-animation {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 50%; }
            100% { transform: translateX(400%); width: 30%; }
        }

        .editor-translations-scroll {
            scrollbar-width: thin;
        }

        .editor-translation-item {
            background: #0f172a;
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid #334155;
        }

        .editor-translation-key {
            font-size: 12px;
            color: #4ade80;
            font-family: monospace;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .editor-translation-field {
            margin-bottom: 10px;
        }

        .editor-translation-field label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .editor-translation-field input, 
        .editor-translation-field textarea {
            width: 100%;
            padding: 8px 12px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 13px;
        }

        .editor-translation-field input:focus,
        .editor-translation-field textarea:focus {
            outline: none;
            border-color: #4ade80;
        }

        /* Страницы */
        .page {
            display: none;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        .page.active {
            display: block;
        }
                /* ============= ИСПРАВЛЕНИЕ КНОПОК В МОДАЛЬНЫХ ОКНАХ ============= */
        .editor-modal .btn-primary,
        .editor-modal .btn-secondary,
        .editor-modal .btn-danger {
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .editor-modal .btn-primary {
            background: #2e7d5e;
            color: white;
        }

        .editor-modal .btn-primary:hover {
            background: #3a9a72;
            transform: translateY(-1px);
        }

        .editor-modal .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .editor-modal .btn-secondary:hover {
            background: #475569;
            transform: translateY(-1px);
        }

        .editor-modal .btn-danger {
            background: #b91c1c;
            color: white;
        }

        .editor-modal .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        /* Кнопки в футере модальных окон */
        .editor-modal-footer .btn-primary,
        .editor-modal-footer .btn-secondary,
        .editor-modal-footer .btn-danger {
            padding: 8px 24px;
            border-radius: 40px;
        }

        /* Кнопки в меню контекста */
        #context-body .btn-primary,
        #context-body .btn-danger {
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
        }

        #context-body .btn-primary {
            background: #2e7d5e;
        }

        #context-body .btn-primary:hover {
            background: #3a9a72;
        }

        #context-body .btn-danger {
            background: #b91c1c;
        }

        #context-body .btn-danger:hover {
            background: #dc2626;
        }

        /* Кнопка "К списку модов" */
        .editor-action-btn:last-child {
            margin-top: 10px;
        }
        
        /* ============= ЗАПРЕТ КОНТЕКСТНОГО МЕНЮ (ПКМ) ============= */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Разрешаем выделение текста в полях ввода и текстовых областях */
        input, textarea, [contenteditable="true"] {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        /* Запрещаем контекстное меню на всей странице, кроме полей ввода */
        body {
            context-menu: none;
        }

        /* Полный запрет ПКМ на элементах, которые его не должны иметь */
        .editor-card,
        .manager-mod-item,
        .card,
        .mod-item,
        .editor-action-btn,
        .action-btn,
        .btn,
        .settings-btn,
        .editor-settings-btn,
        .editor-center-tab-btn,
        .center-tab-btn {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <!-- СТРАНИЦА МЕНЕДЖЕРА (ОРИГИНАЛ) -->
    <div id="manager-page" class="page active">

        function formatToLowerCamel(text) {
            if (!text || typeof text !== 'string') return '';
            const words = text.trim().split(/\s+/);
            if (words.length === 0) return '';
            let result = words[0].toLowerCase();
            for (let i = 1; i < words.length; i++) {
                if (words[i]) {
                    result += words[i].charAt(0).toUpperCase() + words[i].slice(1).toLowerCase();
                }
            }
            return result;
        }

            return typeNames[type] || type;

                if (excludeType === block.type && excludeName === block.name) continue;
                const blockNameFormatted = formatToLowerCamel(block.name);
                if (blockNameFormatted === searchName || block.name === name) {
                    return { exists: true, type: block.type, typeName: getTypeNameInRussian(block.type), name: block.name };

            return { exists: false, type: null };

        }
        
        function validateItemName(name) {
            if (!name || name.trim().length === 0) return { valid: false, error: `${t('item_name_empty_error')}` };
            name = name.trim();
            if (/[а-яА-ЯёЁ]/.test(name)) return { valid: false, error: `${t('item_name_russian_error')}` };
            if (/[!@#$%^&*()_+=\[\]{};:'"\\|,.<>\/?`~]/.test(name)) return { valid: false, error: `${t('item_name_special_error')}` };
            if (/^\d/.test(name)) return { valid: false, error: `${t('item_name_digit_error')}` };
            if (!/^[a-zA-Z0-9\s]+$/.test(name)) return { valid: false, error: `${t('item_name_invalid_error')}` };
            return { valid: true, error: null };
        }
        
        function customConfirm(message, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            const messageEl = document.getElementById('confirm-message');
            const okBtn = document.getElementById('confirm-ok-btn');
            const cancelBtn = document.getElementById('confirm-cancel-btn');
            messageEl.innerHTML = message;
            const newOkBtn = okBtn.cloneNode(true); const newCancelBtn = cancelBtn.cloneNode(true);
            okBtn.parentNode.replaceChild(newOkBtn, okBtn); cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
            newOkBtn.onclick = () => { closeConfirmModal(); if (onConfirm) onConfirm(); };
            newCancelBtn.onclick = () => { closeConfirmModal(); };
            modal.classList.add('active');
        }
        
        function closeConfirmModal() { document.getElementById('confirm-modal').classList.remove('active'); }
        
        // Действия редактора
        async function onActionClick(action) {
            if (action === 1) await openCreateItemModal();
            else if (action === 2) await openCreateLiquidModal();
            else if (action === 3) startCompilation();
            else if (action === 4) { switchTab('translations'); await loadTranslationsData(); }
            else if (action === 5) await eel.editor_open_mod_folder();
            else if (action === 6) openUploadIconModal();
            else if (action === 'refresh') { await loadBlocks(); if (document.querySelector('.editor-center-tab-btn[data-tab="textures"].active')) loadTextures(); if (document.querySelector('.editor-center-tab-btn[data-tab="translations"].active')) loadTranslationsData(); showToast(`${t('Обновить')}`); }
            else showToast(`Действие ${action} выполнено`);
        }
        
        // ============= ЗАПРЕТ КОНТЕКСТНОГО МЕНЮ (ПКМ) =============
        document.addEventListener('contextmenu', function(e) {
            // Разрешаем ПКМ только на полях ввода и текстовых областях
            const tagName = e.target.tagName.toLowerCase();
            const isInput = tagName === 'input' || tagName === 'textarea' || tagName === 'select';
            const hasContentEditable = e.target.isContentEditable;
            
            if (!isInput && !hasContentEditable) {
                e.preventDefault();
                return false;
            }
        });
        
        // Дополнительная защита для изображений (чтобы нельзя было сохранить)
        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
        });
    </script>
</body>
</html>
